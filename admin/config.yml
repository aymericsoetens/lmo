backend:
  name: github
  repo: aymericsoetens/lmo
  branch: main
  site_domain: lamainocculte.fr
  base_url: https://lamainocculte.fr
  auth_endpoint: auth

# Dossier pour les images uploadées
media_folder: "img/uploads"
public_folder: "/img/uploads"

# Interface en français
locale: "fr"
display_url: https://lamainocculte.fr

# Logo personnalisé dans l'admin
logo_url: https://lamainocculte.fr/img/banner/logo2.webp

# Collections
collections:
  # Collection PHOTOS simplifiée (un seul fichier)
  - name: "photos"
    label: "📸 Galerie photos"
    label_singular: "Photo"
    folder: "_data"
    create: false
    file: "_data/photos.json"
    fields:
      - label: "Photos"
        name: "photos"
        widget: "list"
        summary: "{{fields.legende}}"
        fields:
          - { label: "Image", name: "url", widget: "image", required: true }
          - { label: "Légende", name: "legende", widget: "string", required: false }
          - { label: "Date d'ajout", name: "date", widget: "date", default: "{{now}}" }

  # Collection VIDÉOS simplifiée
  - name: "videos"
    label: "🎬 Vidéos"
    label_singular: "Vidéo"
    folder: "_data"
    create: false
    file: "_data/videos.json"
    fields:
      - label: "Vidéos"
        name: "videos"
        widget: "list"
        summary: "{{fields.titre}}"
        fields:
          - { label: "Titre", name: "titre", widget: "string", required: true }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Lien YouTube", name: "url", widget: "string", required: true, pattern: ["https?://(www\\.)?(youtube\\.com|youtu\\.be)/.*", "URL YouTube valide"] }
          - { label: "Date d'ajout", name: "date", widget: "date", default: "{{now}}" }