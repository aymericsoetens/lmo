<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Administration - La Main Occulte</title>
    
    <!-- Style personnalisé pour l'interface d'attente -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 2px solid #6b2d9c;
        }
        .admin-header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }
        .admin-header h1 span {
            color: #c49a6c;
        }
        .admin-header p {
            margin: 0.5rem 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
        }
        .admin-loading {
            display: none;
            text-align: center;
            padding: 3rem;
            color: #888;
            font-size: 1.2rem;
        }
        .admin-loading.active {
            display: block;
        }
        #nc-root {
            min-height: calc(100vh - 90px);
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🎪 La Main Occulte - <span>Administration</span></h1>
        <p>Gérez vos photos et vidéos de la galerie</p>
    </div>
    
    <!-- Conteneur pour Decap CMS -->
    <div id="nc-root"></div>
    
    <div class="admin-loading active" id="loadingMsg">
        ⏳ Chargement de l'interface d'administration...
    </div>
    
    <!-- Chargement de Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // Initialiser Decap CMS avec la configuration
        if (window.CMS) {
            // Masquer le message de chargement
            document.getElementById('loadingMsg').style.display = 'none';
            
            // CMS.init() est appelé automatiquement par Decap CMS
            // quand il trouve le fichier config.yml à la racine du site
            console.log('✅ Decap CMS chargé avec succès !');
            console.log('📋 Configuration chargée depuis /admin/config.yml');
        }
        
        // Écouteur d'événement pour masquer le message de chargement
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loading = document.getElementById('loadingMsg');
                if (loading) {
                    loading.classList.remove('active');
                }
            }, 1500);
        });
    </script>
</body>
</html>
