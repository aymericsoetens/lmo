<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Administration - La Main Occulte</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }
        .admin-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .admin-header p {
            margin: 0.5rem 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🎪 La Main Occulte - Administration</h1>
        <p>Gérez vos photos et vidéos facilement</p>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        // Configuration personnalisée
        window.CMS_MANUAL_INIT = true;
        
        setTimeout(() => {
            if (window.CMS) {
                window.CMS.init();
                console.log('✅ CMS initialisé avec succès');
            } else {
                console.log('⏳ Chargement du CMS...');
            }
        }, 500);
    </script>
</body>
</html>
