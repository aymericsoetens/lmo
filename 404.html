<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page non trouvée - La Main Occulte</title>
<link rel="stylesheet" href="css/style.min.css">
<style>
.error-container{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.error-content{max-width:600px}
.error-code{font-family:'UnifrakturMaguntia',cursive;font-size:8rem;color:#c49a6c;text-shadow:0 0 30px #6b2d9c}
.error-message{font-size:1.5rem;margin:1rem 0}
.error-link{display:inline-block;margin-top:2rem;padding:1rem 2rem;background:linear-gradient(135deg,#6b2d9c,#4a1b6e);color:white;text-decoration:none;border-radius:50px;transition:all .3s ease}
.error-link:hover{transform:translateY(-3px);box-shadow:0 0 20px #6b2d9c}
</style>
</head>
<body>
<div class="error-container"><div class="error-content"><div class="error-code">404</div><h1>Page égarée</h1><p class="error-message">Cette page semble avoir pris la poudre d'escampette... Comme une balle qui aurait roulé trop loin.</p><a href="index.html" class="error-link">Retour à l'accueil →</a></div></div>
</body>
</html>
